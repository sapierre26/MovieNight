<!doctype html>
<html lang="en">
  <head>
    <title>Movie Night</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
      charset="utf-8"
    />
    <link rel="stylesheet" href="/styles/reset.css" />
    <link rel="stylesheet" href="/styles/page.css" />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="https://use.typekit.net/hdy8gyr.css" />
  </head>
  <body class="page">
    <mu-auth>
      <div class="login-container">
        <div class="login-card">
          <h2 id="login-header">New User Signup</h2>

          <main class="card">
            <newuser-form class="login-form" api="/auth/register">
              <div class="form-group">
                <label>
                  <span>Username:</span>
                  <input name="username" autocomplete="off" />
                </label>
              </div>

              <div class="form-group">
                <label>
                  <span>Password:</span>
                  <input type="password" name="password" />
                </label>
              </div>

              <div class="form-group">
                <label>
                  <span>Profile Image Path:</span>
                  <input type="text" name="image" />
                </label>
              </div>

              <div class="form-group">
                <label>
                  <span>Name:</span>
                  <input type="text" name="name" />
                </label>
              </div>

              <div class="form-group">
                <label>
                  <span>Hometown:</span>
                  <input type="text" name="hometown" />
                </label>
              </div>

              <div class="form-group">
                <label>
                  <span>Bio:</span>
                  <textarea name="bio"></textarea>
                </label>
              </div>
            </newuser-form>
          </main>
          <p id="new-user">
            Already have an account?
          </p>
          <a id="new-user-signup" href="login.html">Sign In here!</a>
        </div>
      </div>
    </mu-auth>

    <script type="module">
      import { define, Auth } from "@calpoly/mustang";
      import { NewUserFormElement } from "./src/components/auth/newuser-form";

      define({
        "mu-auth": Auth.Provider,
        "newuser-form": NewUserFormElement,
      });
    </script>
  </body>
</html>
